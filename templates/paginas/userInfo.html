<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>{{name}}</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../../../static/estilo/style.css'>
    <script src='main.js'></script>
    <style>
        .detailedInfo {
            border: solid 0.2em;
            margin-left: 10%;
            margin-right: 10%;
            width: 80%;
            margin-top: 20px;
            border-radius: 20px;
            background: rgb(186, 186, 186);
            height: 100%;
        }
        .headInfo img {
            border: solid 0.2em;
            width: 20%;
            margin-top: 10px;
            margin-left: 40%;
            margin-right: 40%;
            border-radius: 50%;
        }
        .hedInfo {
            background-image: url('{{banner}}')
        }
        .mainInfo {
            border-radius: 20px;
            padding: 15px;
        }
        .dateInfo {
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <a href="{{url_for('Inicio')}}"><img alt=" " src="../../static/img/img_index/logo.png"></a>
    </header>
    <main>
        <!--Menu principal-->
        <nav>
            <ul>
                <li><span><a href="{{url_for('contacto')}}">CONTACTO</a></span></li>
                <li><span><a href="{{url_for('Inicio')}}">PRINCIPAL</a></span></li>
                <li><span><a href="{{url_for('comunidad')}}">COMUNIDAD</a></span></li>
            </ul>
        </nav><br><br><br><br>
        <br><br>
        <div class="detailedInfo">
            <div class="headInfo">
                <img src="#">
            </div><br><br>
            <div style="border: solid 0.2em;" class="mainInfo">
                <label><strong>Nombre: </strong> {{name}} </label><br><br>
                <label><strong>Mote: </strong>{{nick}}</label><br><br>
                <label><strong>Codigo: </strong>#{{cod}}</label><br><br>
            </div><br><br>
            <div style="border: solid 0.2em; border-color: black" class="dateInfo">
                <label><strong>Fecha Incorporacion: </strong>{{joinDate}}</label><br><br>
                <label><strong>Fecha Creación: </strong>{{created}}</label>
            </div>
            <br><br><br>
        </div>
    </main>
    
</body>
</html>

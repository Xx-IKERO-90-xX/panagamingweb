<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Crear Personaje</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../../../../static/estilo/style.css'>
    <script src='../../../../static/scripts/main.js'></script>
    <style>
        main {
            background-image: url(../../../../static/img/img_mc/mc_bg.jpg);
        }
        .errorLabels {
            text-align: center;
        }
        .errorLabels label {
            text-align: center;
            padding: 5px;
            border-radius: 10px;
            border: solid 0.1em;
            border-color: red;
            background: black;
            color: red;
            font-family: Arial;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <header>
        <a href="{{url_for('Inicio')}}"><img alt=" " src="../../../../static/img/img_index/logo.png"></a>
    </header>
    <div class="usuarioSesion">
        <img src="{{session['imgUrl']}}"><br>
        <label>{{session['name']}}</label>
    </div>
    <nav>
        <ul>
            <li><span><a href="{{url_for('comunidad')}}">COMUNIDAD</a></span></li>
            <li><span><a href="{{url_for('Inicio')}}">PRINCIPAL</a></span></li>
            <li><span><a href="{{url_for('soporte')}}">SOPORTE</a></span></li>
            <li><span><a href="{{url_for('cerrarSesion')}}">CERRAR</a></span></li>
        </ul>
    </nav><br>
    <main><br>
        <br><br><br>
        {%if errorMsg != null%}
            <br><br><br>
            <div class="errorLabels">
                <label>{{errorMsg}}</label>
            </div>
        {%endif%}
        <br><br>
        <form action="{{url_for('CrearPersonaje')}}" method="post" class="personajeForm">
            <div class="NuevoPersonaje">
                <label>NOMBRE DE TU NUEVO PERSONAJE</label><br>
                <input type="text" name="pjName" required>
                <br><br>
                <label>COLOR DEL PERSONAJE</label>
                <select name="color" required>
                    <option value="green">💚</option>
                    <option value="blue">💙</option>
                    <option value="red">❤️️</option>
                    <option value="yellow">💛</option>
                    <option value="pink">💗</option>
                    <option value="purple">💜</option>
                </select><br>
                <br>
                <label>DESCRIPCION</label><br>
                <textarea name="pjDescription" required></textarea>
                <br><br>
                <label>URL DE LA IMAGEN REPRESENTATIVA</label><br>
                <input type="text" name="pjImgUrl">
                <br><br>
            </div>
            <br><br>
            <div class="pjButtons">
                <input type="submit" value="ENVIAR">
                <input type="reset" value="RESETEAR">
            </div>
            <br><br><br>
        </form>
        <br><br><br>
        <br><br><br>
        <br><br><br>
    </main>
    <footer>

    </footer>
</body>
</html>

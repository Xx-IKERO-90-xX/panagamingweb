<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>LoginEditPersonaje</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../../../../static/estilo/style.css'>
    <script src='../../../../static/scripts/main.js'></script>
    <style>
        .loginForm {
            background: black;
            margin-left: 20%;
            margin-right: 20%;
            width: 60%;
            padding: 35px;
            margin-top: 200px;
            text-align: center;
            border-radius: 10px;
        }
        label {
            color: white;
            font-family: Arial;
            font-size: 20px;
        }
        .datos {
            background: rgb(0, 43, 0);
            padding: 20px;
            border-radius: 10px;
        }
        .datos input {
            border-color: black;
            font-size: 13px;
            font-family: Arial;
            color: black;
        }
        .loginForm h2 {
            color: white;
            font-family: Arial;
            font-size: 30px;
        }
        .loginButtons input {
            margin: 20px;
            padding: 10px;
            border: solid 0.2em;
            background: black;
            color: white;
            border-color: green;
            font-weight: bold;
            border-radius: 10px;
        }
        .loginButtons input:hover {
            background:rgb(0, 58, 0);
        }
        .errorLabels {
            text-align: center;
        }
        .errorLabels label {
            text-align: center;
            padding: 5px;
            border-radius: 10px;
            border: solid 0.1em;
            border-color: red;
            background: black;
            color: red;
            font-family: Arial;
            font-size: 30px;
        }
    </style>
</head>
<body style="background-image: url(../../../../static/img/img_mc/stone_bg.png);">
    <header>
        <a href="{{url_for('Inicio')}}"><img alt=" " src="../../../../static/img/img_index/logo.png"></a>
    </header>
    <div class="usuarioSesion">
        <img src="{{user.avatar.url}}"><br>
        <label>{{user.name}}</label>
    </div>
    <nav>
        <ul>
            <li><span><a href="{{url_for('contacto')}}">CONTACTO</a></span></li>
            <li><span><a href="{{url_for('Inicio')}}">PRINCIPAL</a></span></li>
            <li><span><a href="{{url_for('comunidad')}}">COMUNIDAD</a></span></li>
            <li><span><a href="{{url_for('cerrarSesion')}}">CERRAR</a></span></li>
        </ul>
    </nav><br>
    <main>
        <form method="post" action="{{url_for('FormEditPersonaje')}}" class="loginForm">
            <h2>LOGIN PERSONAJE</h2>
            <br><br><br>
            {%if errorMsg != null%}
                <div class="errorMsg">
                    <label>{{errorMsg}}</label>
                </div>
            {%endif%}
            <br><br><br>
            <div class="datos">
                <label><strong>ID USUARIO</strong></label><br>
                <input type="text" name="idUser"><br>
                <br>
                <label><strong>CONTRASEÑA</strong></label><br>
                <input type="text" name="passwd"><br>
                <br>
            </div>
            <br>
            <div class="loginButtons">
                <input type="submit" value="Enviar">
                <input type="reset" value="Resetear">
            </div>
        </form>
    </main>
</body>
</html>

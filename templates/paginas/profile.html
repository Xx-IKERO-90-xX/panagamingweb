<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>{{name}}</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../../../static/estilo/style.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='../../static/estilo/profileStyle.css'>
    <script src='main.js'></script>
    <style>
    </style>
</head>
<body>
    <header>
        <a href="{{url_for('Inicio')}}"><img alt=" " src="../../static/img/img_index/logo.png"></a>
    </header>
    <div class="usuarioSesion">
        <img src="{{session['imgUrl']}}"><br>
        <label>{{session['name']}}</label>
    </div>
    <main style="height: 100vh;">
        <!--Menu principal-->
        <nav>
            <ul>
                <li><span><a href="{{url_for('comunidad')}}">COMUNIDAD</a></span></li>
                <li><span><a href="{{url_for('Inicio')}}">PRINCIPAL</a></span></li>
                <li><span><a href="{{url_for('soporte')}}">SOPORTE</a></span></li>
                <li><span><a href="{{url_for('cerrarSesion')}}">CERRAR</a></span></li>
            </ul>
        </nav><br><br><br><br>
        <br><br>
        <div class="profile">
            <h1>TU PERFIL</h1>
            <div class="banner">
                <img src="{{user.avatar.url}}">
            </div>
            <div class="profileData">
                <label><strong>NOMBRE</strong><span>{{user.name}}</span></label>
                <br><br>
                {%if user.nick != 'None'%}
                    <label><strong>MOTE</strong><span>{{user.nick}}</span></label>
                    <br><br>
                {%endif%}
                <label><strong>FECHA INCORPORACIÓN</strong><span>{{user.}}</span></label>
            </div>
        </div>
    </main> 
    <footer>

    </footer>
</body>
</html>
